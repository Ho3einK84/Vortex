name: build

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build single-file template
        run: npm run build

      - name: Verify pongo2 directive guard
        run: npm run guard

      - name: Assert dist/index.html is self-contained
        run: |
          set -e
          f=dist/index.html
          test -f "$f"
          # No external resource loads of any kind.
          if grep -Eiq '<link[^>]+rel=|<script[^>]+src=|@import|url\(["'\'']?https?:' "$f"; then
            echo "::error::dist/index.html references an external resource"; exit 1
          fi
          echo "OK: $(du -h "$f" | cut -f1) self-contained build"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vortex-index-html
          path: dist/index.html
          if-no-files-found: error

  # On a pushed tag (e.g. v1.0.0), attach the freshly built index.html to the
  # matching GitHub Release so releases/latest/download/index.html always works.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Attach index.html to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/index.html
          fail_on_unmatched_files: true
