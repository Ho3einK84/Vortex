/* Vortex base stylesheet — theme tokens + brutalist component styles.
   UnoCSS handles atomic utilities; this file owns the design language: thick
   borders, hard offset shadows, the two themes, rings, splash, modal and lists.
   @font-face blocks for Arad + Exo 2 are prepended by scripts/build.mjs. */

/* --------------------------------------------------------------- theme tokens */
:root,
[data-theme='vortex-light'] {
  --paper: #f3eee1;
  --surface: #fffdf6;
  --ink: #111111;
  --muted: #5b5446;
  --accent: #1f44ff;     /* electric blue */
  --accent-ink: #ffffff;
  --accent2: #ff2d6b;    /* hot pink */
  --accent3: #ffd400;    /* acid yellow */
  --ok: #138a43;
  --danger: #d6122a;
  --grid: rgba(17, 17, 17, 0.06);
  --shadow: var(--ink);
}

[data-theme='vortex-dark'] {
  --paper: #171923;
  --surface: #202231;
  --ink: #f3f1ea;
  --muted: #aaa4b5;
  --accent: #7c9cff;
  --accent-ink: #0f1220;
  --accent2: #ff6f9f;
  --accent3: #ffd45a;
  --ok: #45d483;
  --danger: #ff6464;
  --grid: rgba(243, 241, 234, 0.055);
  --shadow: #05060a;
}

/* --------------------------------------------------------------------- base */
* {
  -webkit-tap-highlight-color: transparent;
}
/* `.hidden` must beat id-level `display` rules (#qr-modal, #offline-banner, …)
   so JS toggling a single class reliably shows/hides those components. */
.hidden {
  display: none !important;
}
html {
  background: var(--paper);
}
body {
  margin: 0;
  min-height: 100vh;
  color: var(--ink);
  background-color: var(--paper);
  /* faint brutalist grid */
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 28px 28px;
  font-family: 'Exo 2', 'Arad', system-ui, -apple-system, sans-serif;
  font-weight: 500;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
html[lang='fa'] body {
  font-family: 'Arad', 'Exo 2', system-ui, sans-serif;
}
a {
  color: inherit;
  text-decoration: none;
}
button {
  font-family: inherit;
  color: inherit;
}
svg {
  display: inline-block;
  vertical-align: middle;
}

/* ------------------------------------------------------------------- splash */
#splash {
  position: fixed;
  inset: 0;
  z-index: 80;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.25rem;
  background: var(--paper);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
#splash .splash-mark {
  width: 64px;
  height: 64px;
  border: 4px solid var(--ink);
  background: var(--accent);
  box-shadow: 6px 6px 0 var(--shadow);
  animation: splash-spin 1.1s steps(8) infinite;
}
#splash .splash-word {
  font-weight: 900;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  font-size: 0.9rem;
}
.splash-out {
  opacity: 0;
  transform: scale(1.04);
  pointer-events: none;
}
@keyframes splash-spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* --------------------------------------------------------------- reveal anim */
[data-reveal] {
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 0.45s cubic-bezier(0.2, 0.8, 0.2, 1),
    transform 0.45s cubic-bezier(0.2, 0.8, 0.2, 1);
}
[data-reveal].revealed {
  opacity: 1;
  transform: none;
}

/* ------------------------------------------------------------------- header */
.brand-mark {
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  background: var(--accent3);
  border: 3px solid var(--ink);
  box-shadow: 3px 3px 0 var(--shadow);
  transform: rotate(-6deg);
}
.brand-mark svg { width: 22px; height: 22px; }

/* --------------------------------------------------------------- status badge */
#status-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-size: 0.72rem;
  padding: 0.3rem 0.6rem;
  border: 2px solid var(--ink);
  background: var(--ok);
  color: #fff;
}
[data-state='limited'] #status-badge { background: var(--accent3); color: #111; }
[data-state='expired'] #status-badge { background: var(--danger); color: #fff; }
[data-state='disabled'] #status-badge { background: var(--muted); color: var(--surface); }
[data-state='on_hold'] #status-badge { background: var(--accent2); color: #fff; }

/* ---------------------------------------------------------------------- rings */
.ring {
  position: relative;
  width: clamp(104px, 31vw, 130px);
  height: clamp(104px, 31vw, 130px);
  outline: 0;
}
.ring svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
  overflow: visible;
  outline: 0;
}
.ring .ring-track {
  fill: none;
  stroke: var(--ink);
  opacity: 0.12;
  stroke-width: 12;
  stroke-linecap: round;
  outline: 0;
}
.ring .ring-value {
  fill: none;
  stroke-width: 12;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.9s cubic-bezier(0.2, 0.8, 0.2, 1);
  outline: 0;
}
#ring-data .ring-value { stroke: var(--accent); }
#ring-time .ring-value { stroke: var(--accent2); }
[data-state='limited'] #ring-data .ring-value { stroke: var(--danger); }
[data-state='expired'] #ring-time .ring-value { stroke: var(--danger); }
.ring-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.ring-center .ring-pct {
  font-weight: 900;
  font-size: 1.5rem;
}
.ring-center .ring-pct.is-infinity svg { width: 28px; height: 28px; }
.ring-center .ring-sub {
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-top: 0.25rem;
}

/* ----------------------------------------------------------------- stat grid */
.stat {
  border: 2px solid var(--ink);
  background: var(--surface);
  padding: 0.6rem 0.7rem;
}
.stat .stat-key {
  font-size: 0.6rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
}
.stat .stat-val {
  font-weight: 900;
  font-size: 1.05rem;
  display: flex;
  align-items: baseline;
  gap: 0.2rem;
}
.stat .stat-val svg { width: 18px; height: 18px; }
.stat .stat-unit {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--muted);
}

/* ------------------------------------------------------------- reset countdown */
#reset-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  border: 2px solid var(--ink);
  background: var(--accent3);
  color: #111;
  padding: 0.45rem 0.7rem;
  font-weight: 800;
}
#reset-row[data-active='false'] { background: var(--surface); color: var(--muted); }
#reset-countdown {
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.02em;
}

/* ----------------------------------------------------------- section heading */
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.6rem;
  width: 100%;
  background: var(--surface);
  border: 3px solid var(--ink);
  box-shadow: 5px 5px 0 var(--shadow);
  padding: 0.7rem 0.9rem;
  cursor: pointer;
}
.section-head .section-title {
  display: flex;
  align-items: center;
  gap: 0.55rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.section-head .section-title svg { width: 22px; height: 22px; color: var(--accent); }
.section-chevron {
  transition: transform 0.2s ease;
}
.section-chevron svg { width: 20px; height: 20px; }
.section-head[aria-expanded='false'] .section-chevron { transform: rotate(-90deg); }
.count-pill {
  font-weight: 900;
  font-size: 0.75rem;
  padding: 0.1rem 0.5rem;
  border: 2px solid var(--ink);
  background: var(--accent);
  color: var(--accent-ink);
}

/* --------------------------------------------------------------- config rows */
.config-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  border: 2px solid var(--ink);
  background: var(--surface);
  padding: 0.5rem 0.6rem;
}
.config-row + .config-row { margin-top: 0.5rem; }
.config-meta {
  display: flex;
  align-items: center;
  gap: 0.55rem;
  min-width: 0;
}
.config-index {
  flex: none;
  width: 26px;
  height: 26px;
  display: grid;
  place-items: center;
  font-weight: 900;
  font-size: 0.8rem;
  border: 2px solid var(--ink);
  background: var(--accent3);
  color: #111;
}
.config-name {
  font-weight: 700;
  font-size: 0.9rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.config-actions { display: flex; gap: 0.4rem; flex: none; }

.icon-btn {
  width: 34px;
  height: 34px;
  display: grid;
  place-items: center;
  border: 2px solid var(--ink);
  background: var(--surface);
  box-shadow: 2px 2px 0 var(--shadow);
  cursor: pointer;
  transition: transform 0.07s ease, box-shadow 0.07s ease, background 0.12s ease;
}
.icon-btn svg { width: 18px; height: 18px; }
.icon-btn:hover { background: var(--accent3); color: #111; }
.icon-btn:active { transform: translate(2px, 2px); box-shadow: none; }

/* ------------------------------------------------------------------ app rows */
.os-group + .os-group { margin-top: 0.6rem; }
.os-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  border: 2px solid var(--ink);
  background: var(--surface);
  padding: 0.55rem 0.75rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  cursor: pointer;
}
.os-head .os-chevron { transition: transform 0.2s ease; }
.os-head .os-chevron svg { width: 18px; height: 18px; }
.os-head[aria-expanded='false'] .os-chevron { transform: rotate(-90deg); }
.os-body { padding-top: 0.5rem; }
.app-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  border: 2px solid var(--ink);
  background: var(--surface);
  padding: 0.45rem 0.55rem;
}
.app-row + .app-row { margin-top: 0.45rem; }
.app-mono {
  flex: none;
  width: 34px;
  height: 34px;
  display: grid;
  place-items: center;
  font-weight: 900;
  border: 2px solid var(--ink);
  background: var(--accent);
  color: var(--accent-ink);
}
.app-name { font-weight: 800; flex: 1 1 auto; min-width: 0; }
.app-actions { display: flex; gap: 0.4rem; flex: none; }
.app-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-weight: 800;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  padding: 0.35rem 0.55rem;
  border: 2px solid var(--ink);
  box-shadow: 2px 2px 0 var(--shadow);
  cursor: pointer;
  transition: transform 0.07s ease, box-shadow 0.07s ease;
}
.app-btn svg { width: 15px; height: 15px; }
.app-btn:active { transform: translate(2px, 2px); box-shadow: none; }
.app-import { background: var(--accent); color: var(--accent-ink); }
.app-get { background: var(--surface); color: var(--ink); }

/* ---------------------------------------------------------------- state note */
#state-note {
  border: 3px solid var(--ink);
  background: var(--danger);
  color: #fff;
  font-weight: 700;
  padding: 0.6rem 0.8rem;
  box-shadow: 4px 4px 0 var(--shadow);
}
[data-state='on_hold'] #state-note { background: var(--accent2); }
[data-state='disabled'] #state-note { background: var(--muted); }

/* ---------------------------------------------------------------- offline bar */
#offline-banner {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  justify-content: center;
  background: var(--accent2);
  color: #fff;
  border-bottom: 3px solid var(--ink);
  font-weight: 800;
  font-size: 0.8rem;
  padding: 0.5rem 0.75rem;
}
#offline-banner svg { width: 18px; height: 18px; }

/* --------------------------------------------------------------------- toast */
#toast {
  position: fixed;
  left: 50%;
  bottom: 1.5rem;
  transform: translateX(-50%);
  z-index: 90;
  background: var(--ink);
  color: var(--paper);
  font-weight: 800;
  border: 3px solid var(--ink);
  box-shadow: 5px 5px 0 var(--accent);
  padding: 0.6rem 1.1rem;
}
.toast-in { animation: toast-pop 0.22s ease; }
@keyframes toast-pop {
  0% { transform: translateX(-50%) translateY(12px); opacity: 0; }
  100% { transform: translateX(-50%) translateY(0); opacity: 1; }
}

/* --------------------------------------------------------------------- modal */
#qr-modal {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.25rem;
  background: rgba(0, 0, 0, 0.55);
}
#qr-modal .modal-card {
  width: min(100%, 340px);
  max-width: calc(100vw - 2rem);
  background: var(--surface);
  border: 4px solid var(--ink);
  box-shadow: 10px 10px 0 var(--shadow);
  padding: 1.1rem;
  box-sizing: border-box;
  text-align: center;
}
#qr-modal-title {
  flex: 1 1 auto;
  min-width: 0;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  word-break: break-word;
  text-align: center;
}
#qr-modal-canvas {
  width: 100%;
  aspect-ratio: 1 / 1;
  border: 3px solid var(--ink);
  background: #fff;
  margin: 0.9rem auto;
  box-sizing: border-box;
  display: grid;
  place-items: center;
}
#qr-modal-text {
  width: 100%;
  box-sizing: border-box;
  padding-inline: 0.25rem;
  font-size: 0.72rem;
  color: var(--muted);
  word-break: break-all;
  max-height: 4.5rem;
  overflow: auto;
  font-family: ui-monospace, monospace;
  direction: ltr;
  text-align: center;
}


/* ----------------------------------------------------------- responsive polish */
html {
  overflow-x: hidden;
  text-size-adjust: 100%;
  -webkit-text-size-adjust: 100%;
}
body {
  overflow-x: hidden;
}
*,
*::before,
*::after {
  box-sizing: border-box;
}
#app {
  max-width: min(28rem, 100vw);
}
html[lang='fa'] body {
  line-height: 1.65;
}
html[dir='rtl'] #app,
html[dir='rtl'] .section-head,
html[dir='rtl'] .os-head,
html[dir='rtl'] .config-row,
html[dir='rtl'] .app-row,
html[dir='rtl'] #reset-row {
  direction: rtl;
}
html[dir='rtl'] #qr-modal .modal-card {
  direction: rtl;
}
html[dir='rtl'] #qr-modal-text,
html[dir='rtl'] .config-name {
  direction: ltr;
}

/* ----------------------------------------------------------- apps scroll/icon */
.apps-scroll {
  max-height: 244px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding-inline: 0.15rem;
  scrollbar-width: thin;
  scrollbar-color: var(--ink) transparent;
}
.apps-scroll::-webkit-scrollbar { width: 6px; }
.apps-scroll::-webkit-scrollbar-thumb {
  background: var(--ink);
  border-radius: 999px;
}
.os-name {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  min-width: 0;
}
.os-icon,
.app-os-icon {
  flex: none;
  display: inline-grid;
  place-items: center;
  border: 2px solid var(--ink);
  background: var(--accent);
  color: var(--accent-ink);
}
.os-icon { width: 28px; height: 28px; }
.app-os-icon { width: 34px; height: 34px; }
.os-icon svg { width: 17px; height: 17px; }
.app-os-icon svg { width: 20px; height: 20px; }

/* Progress strokes should stay rounded and never show browser focus outlines. */
.ring,
.ring *,
.ring svg,
.ring circle {
  outline: 0 !important;
  -webkit-tap-highlight-color: transparent;
}

@media (max-width: 480px) {
  body { background-size: 22px 22px; }
  #app {
    padding-inline: 0.75rem !important;
    padding-top: 0.85rem !important;
    padding-bottom: 4.5rem !important;
  }
  header[data-reveal] {
    align-items: flex-start;
    gap: 0.75rem;
  }
  .brand-mark { width: 34px; height: 34px; }
  .brand-mark svg { width: 19px; height: 19px; }
  #service-card { padding: 0.85rem !important; }

  .ring-center .ring-sub {
    font-size: 0.54rem;
    letter-spacing: 0.04em;
    max-width: 82px;
    text-align: center;
    line-height: 1.15;
  }
  .stat { padding: 0.5rem 0.55rem; min-width: 0; }
  .stat .stat-key { font-size: 0.54rem; letter-spacing: 0.04em; }
  .stat .stat-val { font-size: 0.92rem; min-width: 0; }
  #reset-row {
    align-items: flex-start;
    flex-direction: column;
    font-size: 0.82rem;
    line-height: 1.35;
  }
  .section-head { padding: 0.62rem 0.72rem; }
  .section-head .section-title { min-width: 0; font-size: 0.9rem; }
  .config-row,
  .app-row {
    gap: 0.5rem;
    padding: 0.48rem 0.52rem;
  }
  .config-name,
  .app-name { font-size: 0.86rem; }
  .app-actions { gap: 0.32rem; }
  .app-btn {
    padding: 0.34rem 0.46rem;
    font-size: 0.66rem;
  }
  #qr-modal { padding: 1rem; }
  #qr-modal .modal-card {
    border-width: 3px;
    padding: 0.95rem;
    box-shadow: 6px 6px 0 var(--shadow);
  }
}

@media (max-width: 360px) {
  #app { padding-inline: 0.58rem !important; }
  .ring { width: 96px; height: 96px; }
  .ring .ring-track,
  .ring .ring-value { stroke-width: 10; }
  .ring-center .ring-sub { font-size: 0.49rem; max-width: 74px; }
  .grid.grid-cols-2 { gap: 0.42rem !important; }
  .config-actions,
  .app-actions { gap: 0.25rem; }
  .icon-btn { width: 31px; height: 31px; }
  .app-os-icon { width: 31px; height: 31px; }
  .app-btn span[data-i18n-dyn] { display: none; }
}

/* ---------------------------------------------------- reduced-motion respect */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
  }
}

          <button
            id="lang-toggle"
            class="brutal-btn surface px-2.5 py-2 font-800 text-sm inline-flex items-center gap-1.5"
            aria-label="Toggle language"
          >
            <span data-icon="globe" class="w-4 h-4 inline-flex"></span>
            <span data-slot="label">فا</span>
          </button>
          <button
            id="theme-toggle"
            class="brutal-btn surface px-2.5 py-2 inline-flex items-center"
            aria-label="Toggle theme"
          >
            <span data-slot="icon" class="w-5 h-5 inline-flex"></span>
          </button>
        </div>
      </header>

      <!-- Service card -->
      <section id="service-card" data-reveal class="brutal surface p-4 mt-5" data-state="active">
        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-2 min-w-0">
            <span class="w-5 h-5 inline-flex muted" data-icon="user"></span>
            <span id="username" class="font-900 text-lg truncate">—</span>
          </div>
          <span id="status-badge">—</span>
        </div>

        <!-- Rings -->
        <div class="flex items-center justify-around gap-2 mt-5">
          <div class="ring" id="ring-data">
            <svg viewBox="0 0 120 120">
              <circle class="ring-track" cx="60" cy="60" r="52" />
              <circle class="ring-value" cx="60" cy="60" r="52" />
            </svg>
            <div class="ring-center">
              <div class="ring-pct" id="ring-data-pct">0%</div>
              <div class="ring-sub" data-i18n="data_usage">Data usage</div>
            </div>
          </div>
          <div class="ring" id="ring-time">
            <svg viewBox="0 0 120 120">
              <circle class="ring-track" cx="60" cy="60" r="52" />
              <circle class="ring-value" cx="60" cy="60" r="52" />
            </svg>
            <div class="ring-center">
              <div class="ring-pct" id="ring-time-pct">0</div>
              <div class="ring-sub">
                <span id="ring-time-days">days</span> ·
                <span data-i18n="time_left">Time left</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 gap-2 mt-5">
          <div class="stat">
            <div class="stat-key" data-i18n="used">Used</div>
            <div class="stat-val">
              <span id="stat-used-val">0</span><span class="stat-unit" id="stat-used-unit">B</span>
            </div>
          </div>
          <div class="stat">
            <div class="stat-key" data-i18n="total">Total</div>
            <div class="stat-val">
              <span id="stat-total-val">0</span><span class="stat-unit" id="stat-total-unit">B</span>
            </div>
          </div>
          <div class="stat">
            <div class="stat-key" data-i18n="remaining">Remaining</div>
            <div class="stat-val">
              <span id="stat-remaining-val">0</span
              ><span class="stat-unit" id="stat-remaining-unit">B</span>
            </div>
          </div>
          <div class="stat">
            <div class="stat-key" data-i18n="expires">Expires</div>
            <div class="stat-val">
              <span id="stat-expire-val">—</span><span class="stat-unit" id="stat-expire-unit"></span>
            </div>
          </div>
        </div>

        <!-- Quota reset -->
        <div id="reset-row" class="mt-3" data-active="true">
          <span class="inline-flex items-center gap-2">
            <span class="w-4 h-4 inline-flex" data-icon="refresh"></span>
            <span id="reset-strategy">—</span>
          </span>
          <span class="inline-flex items-center gap-2">
            <span id="reset-label" data-i18n="reset_label">Quota resets in</span>
            <span id="reset-countdown"></span>
          </span>
        </div>

        <!-- State note (expired / limited / disabled / on_hold) -->
        <div id="state-note" class="hidden mt-3"></div>
      </section>

      <!-- Configs -->
      <section data-reveal class="mt-5">
        <button class="section-head" data-collapse="configs-body" aria-expanded="true">
          <span class="section-title">

        <div id="configs-body" class="mt-3">
          <div class="flex gap-2">
            <button

              class="brutal-btn flex-1 surface px-3 py-2 font-800 text-sm inline-flex items-center justify-center gap-2"

              <span class="w-4 h-4 inline-flex" data-icon="copyAll"></span>
              <span data-i18n="copy_all">Copy all</span>
            </button>
            <button
              id="sub-qr-btn"
              class="brutal-btn surface px-3 py-2 font-800 text-sm inline-flex items-center justify-center gap-2"

              <span class="w-4 h-4 inline-flex" data-icon="qr"></span>
              <span data-i18n="sub_qr">Sub QR</span>
            </button>
          </div>
          <div id="configs-list" class="mt-3"></div>
        </div>
      </section>

      <!-- Apps -->
      <section data-reveal class="mt-5">
        <button class="section-head" data-collapse="apps-body" aria-expanded="true">
          <span class="section-title">
            <span data-icon="download"></span>
            <span data-i18n="apps">Apps</span>
          </span>
          <span class="section-chevron" data-icon="chevron"></span>
        </button>

            Pick a client, import in one tap.
          </p>
          <div id="apps-list"></div>
        </div>
      </section>

      <!-- Footer links -->
      <footer data-reveal class="flex gap-2 mt-6">
        <a
          id="support-link"
          class="brutal-btn flex-1 surface px-3 py-2 font-800 text-sm inline-flex items-center justify-center gap-2 hidden"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="w-4 h-4 inline-flex" data-icon="shield"></span>
          <span data-i18n="support">Support</span>
        </a>
        <a
          id="usage-link"
          class="brutal-btn flex-1 surface px-3 py-2 font-800 text-sm inline-flex items-center justify-center gap-2 hidden"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="w-4 h-4 inline-flex" data-icon="database"></span>
          <span data-i18n="usage">Usage</span>
        </a>
      </footer>
    </main>
