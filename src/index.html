<!doctype html>
<html lang="en" dir="ltr" data-theme="vortex-light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Vortex</title>
    <!-- vortex:styles -->
  </head>
  <body>
    <!-- ================= Rebecca data-island (pongo2 bindings only) ================= -->
    <div
      id="rb-data"
      hidden
      data-username="{{ user.username }}"
      data-status="{{ user.status }}"
      data-status-class="{{ user.status_class }}"
      data-data-limit="{{ user.data_limit }}"
      data-reset-strategy="{{ user.data_limit_reset_strategy }}"
      data-used-traffic="{{ user.used_traffic }}"
      data-expire="{{ user.expire }}"
      data-remaining-days="{{ remaining_days }}"
      data-subscription-url="{{ user.subscription_url }}"
      data-usage-url="{{ usage_url }}"
      data-support-url="{{ support_url }}"
      data-token="{{ token }}"
    >
      <script type="text/plain" id="rb-links">{% for link in links %}{{ link }}
{% endfor %}</script>
    </div>

    <!-- ================================= Splash ================================= -->
    <div id="splash" aria-hidden="true">
      <div class="splash-mark"></div>
      <div class="splash-word">Vortex</div>
    </div>

    <!-- ============================== Offline banner ============================ -->
    <div id="offline-banner" class="hidden">
      <span data-icon="offline"></span>
      <span data-i18n="offline">You are offline — showing last loaded data.</span>
    </div>

    <!-- ================================== App =================================== -->
    <main id="app" class="mx-auto w-full max-w-md px-4 pt-5 pb-20" data-state="active">
      <!-- Header -->
      <header data-reveal class="flex items-center justify-between gap-3">
        <div class="flex items-center gap-3">
          <div class="brand-mark" data-icon="bolt"></div>
          <div class="leading-none">
            <div class="font-900 text-xl tracking-tight uppercase">Vortex</div>
            <div class="muted text-xs font-700 mt-1" data-i18n="brand_sub">Subscription</div>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button
            id="lang-toggle"
            class="brutal-btn surface px-2.5 py-2 font-800 text-sm inline-flex items-center gap-1.5"
            aria-label="Toggle language"
          >
            <span data-icon="globe" class="w-4 h-4 inline-flex"></span>
            <span data-slot="label">فا</span>
          </button>
          <button
            id="theme-toggle"
            class="brutal-btn surface px-2.5 py-2 inline-flex items-center"
            aria-label="Toggle theme"
          >
            <span data-slot="icon" class="w-5 h-5 inline-flex"></span>
          </button>
        </div>
      </header>

      <!-- Service card -->
      <section id="service-card" data-reveal class="brutal surface p-4 mt-5" data-state="active">
        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-2 min-w-0">
            <span class="w-5 h-5 inline-flex muted" data-icon="user"></span>
            <span id="username" class="font-900 text-lg truncate">—</span>
          </div>
          <span id="status-badge">—</span>
        </div>

        <!-- Rings -->
        <div class="flex items-center justify-around gap-2 mt-5">
          <div class="ring" id="ring-data">
            <svg viewBox="0 0 120 120">
              <circle class="ring-track" cx="60" cy="60" r="52" />
              <circle class="ring-value" cx="60" cy="60" r="52" />
            </svg>
            <div class="ring-center">
              <div class="ring-pct" id="ring-data-pct">0%</div>
              <div class="ring-sub" data-i18n="data_usage">Data usage</div>
            </div>
          </div>
          <div class="ring" id="ring-time">
            <svg viewBox="0 0 120 120">
              <circle class="ring-track" cx="60" cy="60" r="52" />
              <circle class="ring-value" cx="60" cy="60" r="52" />
            </svg>
            <div class="ring-center">
              <div class="ring-pct" id="ring-time-pct">0</div>
              <div class="ring-sub">
                <span id="ring-time-days">days</span> ·
                <span data-i18n="time_left">Time left</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 gap-2 mt-5">
          <div class="stat">
            <div class="stat-key" data-i18n="used">Used</div>
            <div class="stat-val">
              <span id="stat-used-val">0</span><span class="stat-unit" id="stat-used-unit">B</span>
            </div>
          </div>
          <div class="stat">
            <div class="stat-key" data-i18n="total">Total</div>
            <div class="stat-val">
              <span id="stat-total-val">0</span><span class="stat-unit" id="stat-total-unit">B</span>
            </div>
          </div>
          <div class="stat">
            <div class="stat-key" data-i18n="remaining">Remaining</div>
            <div class="stat-val">
              <span id="stat-remaining-val">0</span
              ><span class="stat-unit" id="stat-remaining-unit">B</span>
            </div>
          </div>
          <div class="stat">
            <div class="stat-key" data-i18n="expires">Expires</div>
            <div class="stat-val">
              <span id="stat-expire-val">—</span><span class="stat-unit" id="stat-expire-unit"></span>
            </div>
          </div>
        </div>

        <!-- Quota reset -->
        <div id="reset-row" class="mt-3" data-active="true">
          <span class="inline-flex items-center gap-2">
            <span class="w-4 h-4 inline-flex" data-icon="refresh"></span>
            <span id="reset-strategy">—</span>
          </span>
          <span class="inline-flex items-center gap-2">
            <span id="reset-label" data-i18n="reset_label">Quota resets in</span>
            <span id="reset-countdown"></span>
          </span>
        </div>

        <!-- State note (expired / limited / disabled / on_hold) -->
        <div id="state-note" class="hidden mt-3"></div>
      </section>

      <!-- Configs -->
      <section data-reveal class="mt-5">
        <button class="section-head" data-collapse="configs-body" aria-expanded="true">
          <span class="section-title">
            <span data-icon="link"></span>
            <span data-i18n="configs">Configs</span>
            <span class="count-pill" id="configs-count">0</span>
          </span>
          <span class="section-chevron" data-icon="chevron"></span>
        </button>
        <div id="configs-body" class="mt-3">
          <div class="flex gap-2">
            <button
              id="copy-all"
              class="brutal-btn flex-1 surface px-3 py-2 font-800 text-sm inline-flex items-center justify-center gap-2"
            >
              <span class="w-4 h-4 inline-flex" data-icon="copyAll"></span>
              <span data-i18n="copy_all">Copy all</span>
            </button>
            <button
              id="sub-qr-btn"
              class="brutal-btn surface px-3 py-2 font-800 text-sm inline-flex items-center justify-center gap-2"
            >
              <span class="w-4 h-4 inline-flex" data-icon="qr"></span>
              <span data-i18n="sub_qr">Sub QR</span>
            </button>
          </div>
          <div id="configs-list" class="mt-3"></div>
        </div>
      </section>

      <!-- Apps -->
      <section data-reveal class="mt-5">
        <button class="section-head" data-collapse="apps-body" aria-expanded="true">
          <span class="section-title">
            <span data-icon="download"></span>
            <span data-i18n="apps">Apps</span>
          </span>
          <span class="section-chevron" data-icon="chevron"></span>
        </button>
        <div id="apps-body" class="mt-3">
          <p class="muted text-xs font-700 mb-2" data-i18n="pick_client">
            Pick a client, import in one tap.
          </p>
          <div id="apps-list"></div>
        </div>
      </section>

      <!-- Footer links -->
      <footer data-reveal class="flex gap-2 mt-6">
        <a
          id="support-link"
          class="brutal-btn flex-1 surface px-3 py-2 font-800 text-sm inline-flex items-center justify-center gap-2 hidden"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="w-4 h-4 inline-flex" data-icon="shield"></span>
          <span data-i18n="support">Support</span>
        </a>
        <a
          id="usage-link"
          class="brutal-btn flex-1 surface px-3 py-2 font-800 text-sm inline-flex items-center justify-center gap-2 hidden"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="w-4 h-4 inline-flex" data-icon="database"></span>
          <span data-i18n="usage">Usage</span>
        </a>
      </footer>
    </main>

    <!-- ================================ QR modal ================================ -->
    <div id="qr-modal" class="hidden" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="modal-card">
        <div class="flex items-center justify-between gap-2">
          <div id="qr-modal-title">QR</div>
          <button id="qr-modal-close" class="icon-btn" aria-label="Close">
            <span data-icon="close"></span>
          </button>
        </div>
        <div id="qr-modal-canvas"></div>
        <div id="qr-modal-text"></div>
        <button
          id="qr-modal-copy"
          class="brutal-cta w-full mt-3 px-3 py-2 inline-flex items-center justify-center gap-2"
        >
          <span class="w-4 h-4 inline-flex" data-icon="copy"></span>
          <span data-i18n="copy">Copy</span>
        </button>
      </div>
    </div>

    <!-- ================================== Toast ================================= -->
    <div id="toast" class="hidden"></div>

    <!-- vortex:script -->
  </body>
</html>
